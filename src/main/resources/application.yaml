spring:
  application:
    name: bank-notification

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

scheduler:
  enabled: true
  cron:
    daily: "0 0 10 * * ?"
    test: "0 */1 * * * ?"

logging:
  level:
    com.example: INFO
    org.springframework.mail: WARN